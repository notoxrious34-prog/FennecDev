name: Build and Release Fennec App

on:
  push:
    tags:
      - 'v*' # يتم التفعيل تلقائياً فقط عندما تقوم برفع Tag يبدأ بحرف v (مثل v2.0.0)

permissions:
  contents: write # صلاحية ضرورية جداً للسماح لـ GitHub بإنشاء الإصدار ورفع الملف

jobs:
  build:
    runs-on: windows-latest # خوادم البناء ستكون بيئة ويندوز لضمان توافق البرنامج

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # يمكنك تعديل هذا الرقم ليطابق إصدار بايثون الذي تستخدمه

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # سيقوم بتثبيت كافة المكتبات التي يستخدمها برنامجك
        pip install -r requirements.txt 

    - name: Build EXE with PyInstaller
      run: |
        # أمر التحويل إلى ملف تنفيذي واحد بدون نافذة كونسول (لبرامج الواجهات)
        # ملاحظة: استبدل main.py باسم الملف الرئيسي لبرنامجك إذا كان مختلفاً
        pyinstaller --noconfirm --onefile --windowed main.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        # سيقوم بجلب الملف التنفيذي الجاهز من مجلد dist ورفعه
        files: dist/*.exe 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
